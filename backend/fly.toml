app = "naruto-ai-backend"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "3000"

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [services.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

  [[services.ports]]
    handlers = ["http"]
    port = 80
  [[services.ports]]
    handlers = ["tls"]
    port = 443
