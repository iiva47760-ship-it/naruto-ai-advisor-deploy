name: Create Upstash Redis on Fly and store REDIS_URL + admin creds

on:
  push:
    branches:
      - run-fly-redis

permissions:
  contents: read
  actions: write
  secrets: write

jobs:
  create-redis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v2

      - name: Create Upstash Redis (non-interactive)
        id: create_redis
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          REDIS_NAME=naruto-ai-redis-$(date +%s)
          echo "Creating Upstash Redis: $REDIS_NAME"

          # Try non-interactive create; fall back to best-effort create
          flyctl redis create --name "$REDIS_NAME" --region "iad" --yes || flyctl redis create --name "$REDIS_NAME" --region "iad" || true

          # Poll until Private URL appears (status output contains 'Private URL')
          for i in $(seq 1 40); do
            STATUS=$(flyctl redis status "$REDIS_NAME" 2>&1) || true
            REDIS_URL=$(echo "$STATUS" | awk -F'= ' '/Private URL/ {print $2}')
            if [ -n "$REDIS_URL" ]; then
              echo "Found REDIS_URL: $REDIS_URL"
              echo "redis_url=$REDIS_URL" >> $GITHUB_OUTPUT
              echo "redis_name=$REDIS_NAME" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Waiting for redis to become available... ($i)"
            sleep 10
          done

          echo "Timed out waiting for redis to be ready" >&2
          exit 1

      - name: Attach REDIS_URL to Fly app secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -e
          echo "Setting REDIS_URL secret on Fly app (naruto-ai-backend)"
          flyctl secrets set REDIS_URL="${{ steps.create_redis.outputs.redis_url }}" --app naruto-ai-backend || true

      - name: Generate admin credentials
        id: gen_admin
        run: |
          set -euo pipefail
          ADMIN_EMAIL=admin@naruto.ai
          ADMIN_PASSWORD=$(openssl rand -base64 12)
          echo "admin_email=$ADMIN_EMAIL" >> $GITHUB_OUTPUT
          echo "admin_password=$ADMIN_PASSWORD" >> $GITHUB_OUTPUT

      - name: Attach admin secrets to Fly app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -e
          echo "Setting ADMIN_EMAIL and ADMIN_PASSWORD on Fly app (naruto-ai-backend)"
          flyctl secrets set ADMIN_EMAIL="${{ steps.gen_admin.outputs.admin_email }}" ADMIN_PASSWORD="${{ steps.gen_admin.outputs.admin_password }}" --app naruto-ai-backend || true

      - name: Save REDIS_URL as repository secret
        uses: peter-evans/create-or-update-secret@v4
        with:
          secret-name: FLY_REDIS_URL
          secret-value: ${{ steps.create_redis.outputs.redis_url }}

      - name: Save admin email as repository secret
        uses: peter-evans/create-or-update-secret@v4
        with:
          secret-name: FLY_ADMIN_EMAIL
          secret-value: ${{ steps.gen_admin.outputs.admin_email }}

      - name: Save admin password as repository secret
        uses: peter-evans/create-or-update-secret@v4
        with:
          secret-name: FLY_ADMIN_PASSWORD
          secret-value: ${{ steps.gen_admin.outputs.admin_password }}

      - name: Reveal admin credentials in workflow logs (will be visible in Actions)
        run: |
          echo "ADMIN_EMAIL=${{ steps.gen_admin.outputs.admin_email }}"
          echo "ADMIN_PASSWORD=${{ steps.gen_admin.outputs.admin_password }}"
